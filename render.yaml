# Render Blueprint — build must NOT use `git lfs pull` (git-lfs CLI is not installed on build workers).
# GitHub LFS files are fetched during `git clone` / checkout on Render.
# https://render.com/docs/yaml-spec
services:
  - type: web
    name: march-madness-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      # From `python scripts/export_models_for_deploy.py` — avoids training on every cold start
      - key: STANDARD_MODEL_PATH
        value: ./artifacts/standard.pkl
      - key: CHAOS_MODEL_PATH
        value: ./artifacts/chaos.pkl
      # Skip loading ~6M-row MMasseyOrdinals.csv on boot (minutes → seconds on small instances)
      - key: SKIP_MASSEY_ORDINALS_API
        value: "1"
